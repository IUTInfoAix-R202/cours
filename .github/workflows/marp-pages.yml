# Build Marp slides and publish to GitHub Pages.
#
# Chaque fichier cm*.md est converti en HTML (slides) et en PDF.
# Une page d'index dédiée est générée par scripts/generate-index.sh
# (ligne par CM, avec liens HTML/PDF si le source existe sinon un
# statut En cours / À venir).
# Le résultat est publié sur :
#   https://iutinfoaix-r202.github.io/cours/

name: Build & Deploy Slides

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Marp + Kroki plugin)
        run: npm ci

      - name: Build HTML slides
        run: |
          mkdir -p _site
          for f in cm*.md; do
            [ -f "$f" ] || continue
            name="${f%.md}"
            echo "Building $f → _site/${name}.html"
            npx marp --config marp.config.js "$f" --output "_site/${name}.html"
          done

      - name: Build PDF slides
        run: |
          npx playwright install --with-deps chromium
          for f in cm*.md; do
            [ -f "$f" ] || continue
            name="${f%.md}"
            echo "Building $f → _site/${name}.pdf"
            npx marp --config marp.config.js "$f" --pdf --output "_site/${name}.pdf" --allow-local-files
          done

      - name: Generate index page
        run: bash scripts/generate-index.sh

      - name: Copy assets
        run: |
          if [ -d assets ]; then
            cp -r assets _site/assets
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
