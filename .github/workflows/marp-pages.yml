# Build Marp slides and publish to GitHub Pages.
#
# Chaque fichier cm*.md est converti en HTML (slides) et en PDF.
# Le résultat est publié sur :
#   https://iutinfoaix-r202.github.io/cours/
#
# Le README.md est copié comme index.html de la racine.

name: Build & Deploy Slides

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Marp + Kroki plugin)
        run: npm ci

      - name: Build HTML slides
        run: |
          mkdir -p _site
          for f in cm*.md; do
            [ -f "$f" ] || continue
            name="${f%.md}"
            echo "Building $f → _site/${name}.html"
            npx marp --config marp.config.js "$f" --output "_site/${name}.html"
          done

      - name: Build PDF slides
        run: |
          npx playwright install --with-deps chromium
          for f in cm*.md; do
            [ -f "$f" ] || continue
            name="${f%.md}"
            echo "Building $f → _site/${name}.pdf"
            npx marp --config marp.config.js "$f" --pdf --output "_site/${name}.pdf" --allow-local-files
          done

      - name: Generate index page
        run: |
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>R2.02 - Cours magistraux</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; color: #333; }
              h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 0.5rem; }
              table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
              th { background: #3498db; color: white; padding: 0.75rem; text-align: left; }
              td { padding: 0.75rem; border-bottom: 1px solid #eee; }
              tr:hover { background: #f5f8fc; }
              a { color: #2980b9; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; color: white; }
              .comprendre { background: #27ae60; }
              .appliquer { background: #f39c12; }
              .analyser { background: #e74c3c; }
              .creer { background: #8e44ad; }
              footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; font-size: 0.85rem; color: #888; }
            </style>
          </head>
          <body>
            <h1>R2.02 - Développement d'applications avec IHM</h1>
            <p>IUT d'Aix-Marseille - BUT Informatique 1<sup>re</sup> année</p>

            <table>
              <thead>
                <tr><th>CM</th><th>Titre</th><th>Bloom</th><th>Slides</th><th>PDF</th></tr>
              </thead>
              <tbody>
                <tr>
                  <td>CM1</td>
                  <td>Fondations de l'IHM et première immersion JavaFX</td>
                  <td><span class="badge comprendre">Comprendre</span></td>
                  <td><a href="cm1-fondations-ihm.html">📺 HTML</a></td>
                  <td><a href="cm1-fondations-ihm.pdf">📄 PDF</a></td>
                </tr>
                <tr>
                  <td>CM2</td>
                  <td>Propriétés, bindings et contrôles</td>
                  <td><span class="badge appliquer">Appliquer</span></td>
                  <td><a href="cm2-donnees-et-liaison.html">📺 HTML</a></td>
                  <td><a href="cm2-donnees-et-liaison.pdf">📄 PDF</a></td>
                </tr>
                <tr>
                  <td>CM3</td>
                  <td>Architecture des IHM et FXML</td>
                  <td><span class="badge analyser">Analyser</span></td>
                  <td><a href="cm3-architecture-ihm.html">📺 HTML</a></td>
                  <td><a href="cm3-architecture-ihm.pdf">📄 PDF</a></td>
                </tr>
                <tr>
                  <td>CM4</td>
                  <td>MVVM, persistance et synthèse</td>
                  <td><span class="badge creer">Créer</span></td>
                  <td><a href="cm4-synthese.html">📺 HTML</a></td>
                  <td><a href="cm4-synthese.pdf">📄 PDF</a></td>
                </tr>
              </tbody>
            </table>

            <footer>
              <p>Supports générés automatiquement depuis les sources Markdown avec <a href="https://marp.app/">Marp</a>.</p>
              <p><a href="https://github.com/IUTInfoAix-R202/cours">📁 Dépôt source</a></p>
            </footer>
          </body>
          </html>
          HTMLEOF

      - name: Copy assets
        run: |
          if [ -d assets ]; then
            cp -r assets _site/assets
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
