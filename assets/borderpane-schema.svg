<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" width="680" height="400">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect x="0" y="0" width="680" height="400" rx="8" fill="#f8f9fa" stroke="#ccc" stroke-width="1.5"/>

  <!-- Titre -->
  <text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#555">BorderPane — 5 zones</text>

  <!-- top -->
  <rect x="20" y="44" width="640" height="60" rx="6" fill="#a8d5e2" stroke="#7cb8c9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="80" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2c5f6e">top</text>
  <text x="630" y="80" text-anchor="end" font-family="monospace" font-size="11" fill="#4a8a9e">setTop()</text>

  <!-- left -->
  <rect x="20" y="110" width="140" height="200" rx="6" fill="#c5cae9" stroke="#9fa8da" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="215" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#3949ab">left</text>
  <text x="90" y="235" text-anchor="middle" font-family="monospace" font-size="10" fill="#5c6bc0">setLeft()</text>

  <!-- center -->
  <rect x="166" y="110" width="348" height="200" rx="6" fill="#ffe0b2" stroke="#e8a838" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="208" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e65100">center</text>
  <text x="340" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#f57c00">setCenter()</text>

  <!-- right -->
  <rect x="520" y="110" width="140" height="200" rx="6" fill="#c5cae9" stroke="#9fa8da" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="590" y="215" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#3949ab">right</text>
  <text x="590" y="235" text-anchor="middle" font-family="monospace" font-size="10" fill="#5c6bc0">setRight()</text>

  <!-- bottom -->
  <rect x="20" y="316" width="640" height="60" rx="6" fill="#a8d5e2" stroke="#7cb8c9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="352" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2c5f6e">bottom</text>
  <text x="630" y="352" text-anchor="end" font-family="monospace" font-size="11" fill="#4a8a9e">setBottom()</text>
</svg>
