<svg viewBox="0 0 1100 570" xmlns="http://www.w3.org/2000/svg" width="1100" height="570">
  <!-- Fond -->
  <rect x="0" y="0" width="1100" height="470" fill="none"/>

  <!-- Mur du fond (Stage) -->
  <rect x="40" y="14" width="1020" height="406" rx="10" fill="#5a5a5a" stroke="#444" stroke-width="2"/>
  <text x="550" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#4a90d9">🖼️ Stage</text>
  <text x="550" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ccc">La fen&#234;tre</text>

  <!-- Scene (interieur) -->
  <rect x="130" y="82" width="840" height="320" rx="6" fill="#3a3a5a" stroke="#7b7baa" stroke-width="1.5"/>
  <text x="550" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#7bb563">🎬 Scene</text>
  <text x="550" y="134" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aab5a0">Le contenu affich&#233; dans la fen&#234;tre</text>

  <!-- Rideau gauche -->
  <path d="M15,10 Q60,210 20,415 L100,415 Q110,210 100,10 Z" fill="#a93226"/>
  <path d="M25,10 Q65,210 25,415 L90,415 Q105,210 95,10 Z" fill="#e74c3c"/>

  <!-- Rideau droit -->
  <path d="M1085,10 Q1040,210 1080,415 L1000,415 Q990,210 1000,10 Z" fill="#a93226"/>
  <path d="M1075,10 Q1035,210 1075,415 L1010,415 Q995,210 1005,10 Z" fill="#e74c3c"/>

  <!-- Masques theatre -->
  <text x="32" y="55" font-size="45">🎭</text>
  <text x="1010" y="55" font-size="45">🎭</text>

  <!-- Nodes sur scene (placement organique) -->
  <!-- Node 1 : Label -->
  <rect x="155" y="148" width="130" height="50" rx="6" fill="#8e44ad" stroke="#7d3c98" stroke-width="1.5"/>
  <text x="220" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">🏷️ Label</text>
  <text x="220" y="186" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">&#233;tiquette de texte</text>

  <!-- Node 2 : Button -->
  <rect x="350" y="175" width="125" height="48" rx="6" fill="#4a90d9" stroke="#3a7bc8" stroke-width="1.5"/>
  <text x="413" y="195" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">🔘 Button</text>
  <text x="413" y="212" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">bouton</text>

  <!-- Node 3 : TextField -->
  <rect x="560" y="145" width="150" height="48" rx="6" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="635" y="165" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">📝 TextField</text>
  <text x="635" y="182" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">champ de saisie</text>

  <!-- Node 4 : CheckBox -->
  <rect x="770" y="165" width="130" height="48" rx="6" fill="#00838f" stroke="#006064" stroke-width="1.5"/>
  <text x="835" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">☑️ CheckBox</text>
  <text x="835" y="202" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">case &#224; cocher</text>

  <!-- Node 5 : VBox -->
  <rect x="185" y="230" width="115" height="55" rx="6" fill="#e8a838" stroke="#d4922e" stroke-width="1.5"/>
  <text x="243" y="253" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">📦 VBox</text>
  <text x="243" y="271" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">conteneur</text>

  <!-- Node 6 : ImageView -->
  <rect x="520" y="240" width="140" height="45" rx="6" fill="#2c3e50" stroke="#1a252f" stroke-width="1.5"/>
  <text x="590" y="259" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">🌄 ImageView</text>
  <text x="590" y="276" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">image</text>

  <!-- Node 7 : Slider -->
  <rect x="380" y="255" width="120" height="45" rx="6" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="440" y="274" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">🎚️ Slider</text>
  <text x="440" y="291" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">contr&#244;le</text>

  <!-- Node 8 : HBox -->
  <rect x="700" y="250" width="120" height="48" rx="6" fill="#e8a838" stroke="#d4922e" stroke-width="1.5"/>
  <text x="760" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">📦 HBox</text>
  <text x="760" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">conteneur</text>

  <!-- Node 9 : MenuBar -->
  <rect x="250" y="310" width="135" height="50" rx="6" fill="#5b2c6f" stroke="#4a235a" stroke-width="1.5"/>
  <text x="318" y="330" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">📋 MenuBar</text>
  <text x="318" y="348" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">barre de menus</text>

  <!-- Node 10 : Circle -->
  <rect x="550" y="318" width="110" height="45" rx="6" fill="#c0392b" stroke="#96281b" stroke-width="1.5"/>
  <text x="605" y="337" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">⭕ Circle</text>
  <text x="605" y="354" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">forme</text>

  <!-- Node 11 : ListView -->
  <rect x="730" y="325" width="125" height="45" rx="6" fill="#1a5276" stroke="#154360" stroke-width="1.5"/>
  <text x="793" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">📜 ListView</text>
  <text x="793" y="361" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">liste</text>

  <!-- Etiquette "Nodes" -->
  <text x="550" y="389" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ccc" font-style="italic">Les Nodes sont les acteurs de la sc&#232;ne</text>

  <!-- Plancher scene -->
  <rect x="15" y="415" width="1070" height="14" rx="3" fill="#8B4513"/>

  <!-- Spectateurs (rang unique) -->
  <g fill="#1a1a1a">
    <circle cx="150" cy="475" r="18"/><circle cx="150" cy="453" r="12" fill="#555"/>
    <circle cx="230" cy="475" r="18"/><circle cx="230" cy="453" r="12" fill="#555"/>
    <circle cx="310" cy="475" r="18"/><circle cx="310" cy="453" r="12" fill="#555"/>
    <circle cx="390" cy="475" r="18"/><circle cx="390" cy="453" r="12" fill="#555"/>
    <circle cx="470" cy="475" r="18"/><circle cx="470" cy="453" r="12" fill="#555"/>
    <circle cx="550" cy="475" r="18"/><circle cx="550" cy="453" r="12" fill="#4a90d9"/>
    <circle cx="630" cy="475" r="18"/><circle cx="630" cy="453" r="12" fill="#555"/>
    <circle cx="710" cy="475" r="18"/><circle cx="710" cy="453" r="12" fill="#555"/>
    <circle cx="790" cy="475" r="18"/><circle cx="790" cy="453" r="12" fill="#555"/>
    <circle cx="870" cy="475" r="18"/><circle cx="870" cy="453" r="12" fill="#555"/>
    <circle cx="950" cy="475" r="18"/><circle cx="950" cy="453" r="12" fill="#555"/>
  </g>

  <!-- Annotation utilisateur -->
  <text x="550" y="530" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4a90d9" font-weight="bold">&#x1F464; L'utilisateur est le spectateur principal</text>
</svg>
